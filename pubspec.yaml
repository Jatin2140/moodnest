name: moodnest
description: "MoodNest — Your nest of calm. A mental wellness app with mood tracking, guided meditations, breathing exercises, and journaling."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Local persistence / cache
  shared_preferences: ^2.3.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # UI / UX
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  fl_chart: ^0.69.0
  flutter_animate: ^4.5.0
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  audioplayers: ^6.1.0
  intl: ^0.19.0
  uuid: ^4.5.1
  connectivity_plus: ^6.0.5
  share_plus: ^10.0.2
  path_provider: ^2.1.4
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  integration_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 23
  adaptive_icon_background: "#FFF1E0"
  adaptive_icon_foreground: "assets/images/app_icon_fg.png"

flutter_native_splash:
  color: "#FFF1E0"
  image: assets/images/splash_logo.png
  android_12:
    color: "#FFF1E0"
    image: assets/images/splash_logo.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/audio/meditations/
    - assets/data/
